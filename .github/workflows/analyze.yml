name: Twitter Analysis

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # Required for committing reports and RSS feed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        run: pnpm build

      - name: Run Twitter analysis
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: pnpm analyze

      - name: Generate RSS feed
        run: pnpm generate:rss

      - name: Commit and push reports
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add reports/ public/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update analysis reports $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Send Telegram notification
        if: env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          REPORT_COUNT=$(find reports -name "*.md" -type f | wc -l)
          MESSAGE="✅ Twitter Analysis completed successfully
          📊 Total reports: $REPORT_COUNT
          📅 Date: $(date +'%Y-%m-%d')
          🔗 View: https://${{ github.repository_owner }}.github.io/twitter-radar/"

          curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${TELEGRAM_CHAT_ID}\", \"text\": \"${MESSAGE}\", \"parse_mode\": \"HTML\"}"
